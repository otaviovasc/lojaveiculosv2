name: Staging Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Staging API base URL. Defaults to STAGING_API_BASE_URL secret."
        required: false
        type: string
  deployment_status:

concurrency:
  group: staging-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Staging smoke checks
    if: github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: ${{ inputs.base_url || secrets.STAGING_API_BASE_URL }}
    steps:
      - name: Require base URL
        run: test -n "$BASE_URL"

      - name: Check health
        run: curl --fail --show-error --silent "$BASE_URL/health"
